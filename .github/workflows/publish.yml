name: Publish to Thunderstore

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to publish (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release Asset
        id: download_asset
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            const target_tag = context.payload.inputs ? context.payload.inputs.tag : (context.payload.release ? context.payload.release.tag_name : null);
            if (!target_tag) throw new Error("Could not determine target tag.");
            
            console.log(`Target tag: ${target_tag}`);
            
            let release_id;
            // Always fetch the release by tag to ensure we have the most up-to-date metadata
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: target_tag,
              });
              release_id = release.data.id;
              console.log(`Found Release ID: ${release_id}`);
            } catch (e) {
              throw new Error(`Could not find a release for tag ${target_tag}. Did you create it?`);
            }

            // RETRY LOOP: Wait for GitHub to finish processing the upload
            let asset = null;
            for (let i = 0; i < 12; i++) { // Try for 60 seconds
              const assets = await github.rest.repos.listReleaseAssets({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release_id,
              });
              
              asset = assets.data.find(a => a.name.toLowerCase().endsWith('.zip'));
              if (asset) break;
              
              console.log(`Waiting for zip asset... (Attempt ${i+1}/12)`);
              await new Promise(r => setTimeout(r, 5000));
            }

            if (!asset) {
              throw new Error(`No .zip asset found in release ${target_tag} after 60 seconds.`);
            }
            
            console.log(`Downloading asset: ${asset.name}`);
            const fs = require('fs');
            const data = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id,
              headers: { accept: 'application/octet-stream' }
            });
            fs.writeFileSync('mod_package.zip', Buffer.from(data.data));

      - name: Upload to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: "repo"
          namespace: "binaryn3xus"
          name: "Omni_Extraction_Toolkit"
          version: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          file: ./mod_package.zip
