name: Publish to Thunderstore

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release Asset
        id: download_asset
        uses: actions/github-script@v7
        with:
          script: |
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
            });
            const asset = assets.data.find(a => a.name.endsWith('.zip'));
            if (!asset) throw new Error("No .zip asset found in release!");
            
            const fs = require('fs');
            const data = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id,
              headers: { accept: 'application/octet-stream' }
            });
            fs.writeFileSync('mod_package.zip', Buffer.from(data.data));

      - name: Upload to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: "repo"
          namespace: "binaryn3xus"
          name: "Omni_Extraction_Toolkit"
          version: ${{ github.event.release.tag_name }}
          file: ./mod_package.zip
