name: Publish to Thunderstore

on:
  release:
    types: [published]
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release Asset
        id: download_asset
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolve deprecation warning
        with:
          script: |
            const release_id = context.payload.release ? context.payload.release.id : null;
            if (!release_id) {
              throw new Error("This action must be triggered by a release or manually with a valid context.");
            }

            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release_id,
            });
            
            // Look for any zip file
            const asset = assets.data.find(a => a.name.toLowerCase().endsWith('.zip'));
            if (!asset) {
              console.log("Current assets found:", assets.data.map(a => a.name));
              throw new Error("No .zip asset found in release! Make sure you attached your mod zip file.");
            }
            
            console.log(`Downloading asset: ${asset.name}`);
            const fs = require('fs');
            const data = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id,
              headers: { accept: 'application/octet-stream' }
            });
            fs.writeFileSync('mod_package.zip', Buffer.from(data.data));

      - name: Upload to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: "repo"
          namespace: "binaryn3xus"
          name: "Omni_Extraction_Toolkit"
          version: ${{ github.event.release.tag_name }}
          file: ./mod_package.zip
